<!-- This is GUI for Breast Cancer Detection Application Using Machine Learning Classifier -->

<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ML API</title>

  <style>
    body {
      background-color: #0A0F2E;
      margin: 0;
      padding: 0;
      font-family: Georgia, 'Times New Roman', serif;
    }

    /* Banner SVG container */
    .banner-container {
      width: 100%;
      display: block;
      line-height: 0;
    }

    .banner-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* CSS code for button */
    .button_css {
      color: #494949 !important;
      text-transform: uppercase;
      text-decoration: none;
      background: #ffffff;
      padding: 20px;
      border: 4px solid #494949 !important;
      display: inline-block;
      transition: all 0.4s ease 0s;
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 14px;
    }

    .button_css:hover {
      color: #ffffff !important;
      background: #7C3AED;
      border-color: #7C3AED !important;
      transition: all 0.4s ease 0s;
    }

    h1 {
      color: #EDE9FE;
    }

    input[type="text"] {
      border: 2px solid #7C3AED;
      border-radius: 4px;
      padding: 8px 12px;
      margin: 4px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s;
      background-color: #1E1B4B;
      color: #EDE9FE;
    }

    input[type="text"]::placeholder {
      color: #A89FD6;
    }

    input[type="text"]:focus {
      border-color: #A855F7;
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.15);
    }
  </style>

</head>

<body>

  <!-- AI Medical Center SVG Banner -->
  <div class="banner-container">
    <svg width="100%" viewBox="0 0 1400 280" role="img" xmlns="http://www.w3.org/2000/svg">
      <title>AI Medical Center – Breast Cancer Detection Application Using Machine Learning Classifier</title>

      <!-- Background: deep navy -->
      <rect width="1400" height="280" fill="#0A0F2E"/>

      <defs>
        <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
          <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1C2A6B" stroke-width="0.8"/>
        </pattern>
        <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#0A0F2E" stop-opacity="0"/>
          <stop offset="30%" stop-color="#0A0F2E" stop-opacity="0"/>
          <stop offset="60%" stop-color="#0A0F2E" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#0A0F2E" stop-opacity="1"/>
        </linearGradient>
        <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
          <stop offset="40%" stop-color="#A855F7" stop-opacity="0.3"/>
          <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#0A0F2E" stop-opacity="0"/>
        </linearGradient>
      </defs>

      <!-- Grid overlay -->
      <rect width="1400" height="280" fill="url(#grid)"/>

      <!-- Glow strip -->
      <rect x="0" y="60" width="1400" height="160" fill="url(#glowGrad)"/>

      <!-- Heartbeat / ECG line -->
      <polyline
        points="340,140 390,140 410,80 430,200 450,120 470,160 490,140 600,140 625,140 640,60 660,220 680,100 700,170 720,140 900,140"
        fill="none" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline
        points="340,140 390,140 410,80 430,200 450,120 470,160 490,140 600,140 625,140 640,60 660,220 680,100 700,170 720,140 900,140"
        fill="none" stroke="#D8B4FE" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>

      <!-- Right glow dot -->
      <circle cx="1340" cy="140" r="8" fill="#7C3AED" opacity="0.9"/>
      <circle cx="1340" cy="140" r="20" fill="#7C3AED" opacity="0.2"/>

      <!-- Left dark panel -->
      <rect x="0" y="0" width="340" height="280" fill="#060B22" opacity="0.7"/>

      <!-- Doctor silhouette -->
      <circle cx="155" cy="52" r="32" fill="#1E3A5F"/>
      <ellipse cx="155" cy="30" rx="36" ry="10" fill="#2563EB"/>
      <rect x="119" y="26" width="72" height="8" rx="2" fill="#1D4ED8"/>
      <path d="M100 120 Q130 90 155 88 Q180 90 210 120 L215 240 L95 240 Z" fill="#1E40AF"/>
      <path d="M137 88 L155 110 L173 88" fill="none" stroke="#3B82F6" stroke-width="2"/>
      <path d="M135 130 Q115 160 118 190 Q120 215 138 218 Q158 220 162 200 L162 175 Q165 165 175 165 Q185 165 185 155 Q185 147 176 147" fill="none" stroke="#7C3AED" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="176" cy="144" r="7" fill="#A855F7"/>
      <path d="M210 140 Q220 155 215 175 Q210 190 200 185" fill="none" stroke="#1E3A5F" stroke-width="14" stroke-linecap="round"/>
      <rect x="250" y="0" width="90" height="280" fill="url(#leftFade)"/>

      <!-- Brain + AI icon -->
      <g transform="translate(480, 58)">
        <circle cx="0" cy="0" r="34" fill="#1E1B4B" stroke="#7C3AED" stroke-width="1.5"/>
        <path d="M-5,-18 Q-28,-18 -28,0 Q-28,18 -5,22 L-5,-18Z" fill="none" stroke="#A855F7" stroke-width="2" stroke-linecap="round"/>
        <path d="M0,-20 Q22,-20 22,-4 Q22,10 10,18 Q4,22 0,22" fill="none" stroke="#C084FC" stroke-width="2" stroke-linecap="round"/>
        <circle cx="-16" cy="-5" r="2.5" fill="#A855F7"/>
        <circle cx="-16" cy="8" r="2.5" fill="#A855F7"/>
        <circle cx="-8" cy="2" r="2.5" fill="#C084FC"/>
        <path d="M6,8 Q10,14 8,20" fill="none" stroke="#DDD6FE" stroke-width="1.5" stroke-linecap="round"/>
        <line x1="2" y1="26" x2="14" y2="26" stroke="#7C3AED" stroke-width="1.5"/>
        <line x1="4" y1="30" x2="12" y2="30" stroke="#7C3AED" stroke-width="1.5"/>
      </g>

      <!-- Main title -->
      <text x="540" y="110" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" fill="#EDE9FE" letter-spacing="1">AI Medical Center</text>

      <!-- Underline accent -->
      <rect x="540" y="122" width="580" height="3" rx="2" fill="#7C3AED"/>
      <rect x="540" y="122" width="200" height="3" rx="2" fill="#C084FC"/>

      <!-- Subtitle lines -->
      <text x="540" y="175" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="600" fill="#E2E8F0" letter-spacing="0.5">Breast Cancer Detection Application</text>
      <text x="540" y="218" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="600" fill="#E2E8F0" letter-spacing="0.5">Using Machine Learning Classifier</text>

      <!-- Bottom accent -->
      <rect x="0" y="270" width="1400" height="3" fill="#7C3AED" opacity="0.6"/>
      <rect x="0" y="270" width="400" height="3" fill="#A855F7"/>
    </svg>
  </div>


  <div class="login">

    <!-- Get input for predict the cancer -->
    <center>
    <form action="/predict" method="post">
        <h1>Enter the value of tumor features >>></h1>

        <input type="text" name="mean_radius" placeholder="mean radius" required="required" />
        <input type="text" name="mean_texture" placeholder="mean texture" required="required" />
        <input type="text" name="mean_perimeter" placeholder="mean perimeter" required="required" />
        <input type="text" name="mean_area" placeholder="mean area" required="required" />
        <input type="text" name="mean_smoothness" placeholder="mean smoothness" required="required" />
        <input type="text" name="mean_compactness" placeholder="mean compactness" required="required" />
        <br>
        <input type="text" name="mean_concavity" placeholder="mean concavity" required="required" />
        <input type="text" name="mean_concave_points" placeholder="mean concave points" required="required" />
        <input type="text" name="mean_symmetry" placeholder="mean symmetry" required="required" />
        <input type="text" name="mean_fractal_dimension" placeholder="mean fractal dimension" required="required" />
        <input type="text" name="radius_error" placeholder="radius error" required="required" />
        <input type="text" name="texture_error" placeholder="texture error" required="required" />
        <br>
        <input type="text" name="perimeter_error" placeholder="perimeter error" required="required" />
        <input type="text" name="area_error" placeholder="area error" required="required" />
        <input type="text" name="smoothness_error" placeholder="smoothness error" required="required" />
        <input type="text" name="compactness_error" placeholder="compactness error" required="required" />
        <input type="text" name="concavity_error" placeholder="concavity error" required="required" />
        <input type="text" name="concave_points_error" placeholder="concave points error" required="required" />
        <br>
        <input type="text" name="symmetry_error" placeholder="symmetry error" required="required" />
        <input type="text" name="fractal_dimension_error" placeholder="fractal dimension error" required="required" />
        <input type="text" name="worst_radius" placeholder="worst radius" required="required" />
        <input type="text" name="worst_texture" placeholder="worst texture" required="required" />
        <input type="text" name="worst_perimeter" placeholder="worst perimeter" required="required" />
        <input type="text" name="worst_area" placeholder="worst area" required="required" />
        <br>
        <input type="text" name="worst_smoothness" placeholder="worst smoothness" required="required" />
        <input type="text" name="worst_compactness" placeholder="worst compactness" required="required" />
        <input type="text" name="worst_concavity" placeholder="worst concavity" required="required" />
        <input type="text" name="worst_concave_points" placeholder="worst concave points" required="required" />
        <input type="text" name="worst_symmetry" placeholder="worst symmetry" required="required" />
        <input type="text" name="worst_fractal_dimension" placeholder="worst fractal dimension" required="required" />
        <br><br>

        <!-- Submit button -->
        <div class="button_cont" align="center">
          <button type="submit" class="button_css"><strong>Predict Cancer</strong></button>
        </div>

    </form>
    </center>

    <!-- Show predicted output using ML model -->
    <div>
      <center>
        <h1>{{ prediction_text }}</h1>
      </center>
    </div>

  </div>

</body>
</html>
