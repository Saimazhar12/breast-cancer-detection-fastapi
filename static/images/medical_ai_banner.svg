    <line x1="4" y1="30" x2="12" y2="30" stroke="#7C3AED" stroke-width="1.5" style="fill:rgb(0, 0, 0);stroke:rgb(124, 58, 237);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
