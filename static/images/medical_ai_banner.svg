<svg width="100%" viewBox="0 0 1410 290" role="img" xmlns="http://www.w3.org/2000/svg" style="">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Medical AI Banner – Breast Cancer Detection Application Using Machine Learning Classifier</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">A redesigned banner with a deep navy and violet color scheme, featuring a heartbeat line, caduceus icon, and the subtitle text about the breast cancer detection application.</desc>

  <!-- Background: deep navy -->
  <rect width="1400" height="280" fill="#0A0F2E" style="fill:rgb(10, 15, 46);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Grid lines overlay -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1C2A6B" stroke-width="0.8"/>
    </pattern>
    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0A0F2E" stop-opacity="0"/>
      <stop offset="30%" stop-color="#0A0F2E" stop-opacity="0"/>
      <stop offset="60%" stop-color="#0A0F2E" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0A0F2E" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="40%" stop-color="#A855F7" stop-opacity="0.3"/>
      <stop offset="70%" stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0A0F2E" stop-opacity="0"/>
    </linearGradient>
  <mask id="imagine-text-gaps-3ydvqb" maskUnits="userSpaceOnUse"><rect x="0" y="0" width="1410" height="290" fill="white"/><rect x="532.866455078125" y="51.59614562988281" width="602.3213500976562" height="74.50481414794922" fill="black" rx="2"/><rect x="536" y="143.23129272460938" width="623.7420654296875" height="40.03579330444336" fill="black" rx="2"/><rect x="536" y="186.23130798339844" width="591.8098754882812" height="40.03579330444336" fill="black" rx="2"/></mask></defs>

  <rect width="1400" height="280" fill="url(#grid)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

