  <polyline points="340,140 390,140 410,80 430,200 450,120 470,160 490,140 600,140 625,140 640,60 660,220 680,100 700,170 720,140 900,140" fill="none" stroke="#D8B4FE" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.5" mask="url(#imagine-text-gaps-3ydvqb)" style="fill:none;stroke:rgb(216, 180, 254);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:round;stroke-linejoin:round;opacity:0.5;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

