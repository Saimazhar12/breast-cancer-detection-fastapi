  <polyline points="340,140 390,140 410,80 430,200 450,120 470,160 490,140 600,140 625,140 640,60 660,220 680,100 700,170 720,140 900,140" fill="none" stroke="#A855F7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" mask="url(#imagine-text-gaps-3ydvqb)" style="fill:none;stroke:rgb(168, 85, 247);color:rgb(0, 0, 0);stroke-width:2.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
